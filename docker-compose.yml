version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time arguments for NEXT_PUBLIC_* variables
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
        NEXT_PUBLIC_BACKEND_URL: https://connektx-blogs-backend.onrender.com/api
        NEXT_PUBLIC_APP_BACKEND_URL: https://social-backend-y1rg.onrender.com
        NEXT_PUBLIC_WHATSAPP_URL: https://chat.whatsapp.com/INystETCrasCHg9fWHnWyT
    ports:
      - "3000:3000"
    environment:
      # Runtime environment variables (server-side only, not exposed to browser)
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Optional: AWS Secrets Manager ARN
      # - AWS_SECRET_ARN=${AWS_SECRET_ARN}
      # - AWS_REGION=${AWS_REGION}
      # - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      # - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    # Alternative: Load from .env.local file
    # env_file:
    #   - .env.local
    # Health check disabled for consistency with production setup
    # In production, ALB target group health checks monitor /api/health
    # healthcheck:
    #   test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
    #   interval: 30s
    #   timeout: 3s
    #   retries: 3
    #   start_period: 40s
    restart: unless-stopped

# For production deployments with multiple services, you can add:
# networks:
#   connektx-network:
#     driver: bridge
